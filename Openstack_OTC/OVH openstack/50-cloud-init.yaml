network:
  version: 2
  renderer: networkd

  ethernets:
    enp1s0f0:
      dhcp4: false
      dhcp6: false
      # This NIC belongs to br-ex
      # No IP directly here
    enp1s0f1:
      dhcp4: false
      dhcp6: false
      # This NIC belongs to br-int2
      # No IP directly here

  bridges:
    br-ex:
      interfaces: [enp1s0f0]
      dhcp4: no
      addresses:
        - 162.19.169.215/24
      routes:
        - to: default
          via: 162.19.169.254
      nameservers:
        addresses: [213.186.33.99, 8.8.8.8]

    br-int2:
      interfaces: [enp1s0f1]
      dhcp4: no
      dhcp6: yes   # Allow IPv6 configuration
      accept-ra: yes
      addresses:
        - "2001:41d0:700:6cd8::1/64"  # Adjust to your subnet