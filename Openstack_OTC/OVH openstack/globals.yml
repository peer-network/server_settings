---
workaround_ansible_issue_8743: yes
kolla_base_distro: "ubuntu"

# All traffic goes through enp1s0f0 (single NIC with IP aliasing)
#network_interface: "enp1s0f0"
#api_interface: "enp1s0f0"

# --- Network Interfaces ---
# Management and API network (internal control plane)
network_interface: "br-int"
api_interface: "br-int"

tunnel_interface: "enp1s0f0"
storage_interface: "enp1s0f0"

# Main IP for internal/backend services
kolla_internal_vip_address: "162.19.169.215"
# Second IP for external/API access
kolla_external_vip_address: "51.38.118.220"
# adding fdqn
kolla_internal_fqdn: "peer-ohv.openstack.local"


# Enable HAProxy to handle the VIP routing (turn off)
enable_haproxy: "no"
# Keepalived not needed for single node
enable_keepalived: "no"
# enable_proxysql: "no"

# Core OpenStack services
enable_openstack_core: "yes"
neutron_plugin_agent: "openvswitch"

# Bind HAProxy to both IPs
kolla_enable_tls_external: "no"
kolla_enable_tls_internal: "no"

# Network type configuration
enable_neutron_provider_networks: "yes"
neutron_external_interface: "enp1s0f0"

# --- Bridge Mappings ---
# physnet1 → br-ex (external IPv4)
# physnet2 → br-int (internal IPv6 / vRack or VXLAN)
neutron_ovs_bridge_mappings:
  - "physnet1:br-ex"
  - "physnet2:br-int"

# --- Tunnel, Storage, and Cluster Traffic ---
# These run over your IPv6 / br-int bridge
tunnel_interface: "br-int"
storage_interface: "br-int"
cluster_interface: "br-int"


# Cinder block storage
enable_cinder: "yes"
enable_cinder_backend_lvm: "yes"
cinder_volume_group: "cinder-volumes"

# Ensure services bind to the correct addresses
# Internal services use internal VIP
rabbitmq_bind_interface: "{{ network_interface }}"
mariadb_bind_interface: "{{ network_interface }}"

# --- Logging ---
kolla_logs_dir: "/opt/kolla/logs"
