---
# Kolla configuration
workaround_ansible_issue_8743: yes
kolla_base_distro: "ubuntu"
kolla_install_type: "source"
openstack_release: "2024.1"

# Network configuration
# Management/API network - Public NIC
network_interface: "enp1s0f0"
api_interface: "enp1s0f0"
storage_interface: "enp1s0f0"
cluster_interface: "enp1s0f0"

# Tunnel network for tenant traffic - vRack NIC
tunnel_interface: "enp1s0f1"

# External network interface - vRack NIC (OVS will manage this)
neutron_external_interface: "enp1s0f1"

# VIP address on management network
kolla_internal_vip_address: "162.19.169.215"
kolla_external_vip_address: "162.19.169.215"
kolla_internal_fqdn: "openstack.ovh.local"
kolla_external_fqdn: "{{ kolla_internal_fqdn }}"

# Networking
neutron_plugin_agent: "openvswitch"
neutron_bridge_name: "br-ex"
neutron_ovs_bridge_mappings:
  - "physnet1:br-ex"

# Enable jumbo frames for vRack
neutron_global_physnet_mtu: 9000

# Keystone - use port 5100 to avoid Docker registry conflict
keystone_admin_port: "5100"
keystone_public_port: "5100"

# Disable HAProxy and Keepalived for single-node
enable_haproxy: "no"
enable_keepalived: "no"

# Core OpenStack services
enable_openstack_core: "yes"
enable_glance: "yes"
enable_nova: "yes"
enable_neutron: "yes"
enable_keystone: "yes"
enable_horizon: "yes"

# Cinder with ZFS backend
enable_cinder: "yes"
enable_cinder_backend_zfs: "yes"
cinder_backend_zfs_pool: "peer_pool/cinder-zvol"
cinder_backend_zfs_volume_name: "cinder-volumes"

# Additional services
enable_rabbitmq: "yes"
rabbitmq_user: "openstack"

# Disable iptables management - security via OpenStack security groups only
enable_neutron_provider_networks: "yes"

# Logs
kolla_logs_dir: "/var/log/kolla"

# Docker registry
docker_registry: "quay.io"
docker_namespace: "openstack.kolla"

# Enable TLS for external access (optional - can enable later)
kolla_enable_tls_external: "no"
kolla_external_fqdn_cert: "{{ node_config_directory }}/certificates/haproxy.pem"

# Barbican (optional - for secrets management)
enable_barbican: "no"

# Octavia (optional - for load balancing)
enable_octavia: "no"

# Redis (required for some services)
enable_redis: "yes"