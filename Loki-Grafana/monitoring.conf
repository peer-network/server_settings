# /etc/nginx/sites-available/monitoring.conf
server {
    listen 80 default_server;
    server_name _;


    location = /grafana {
        return 301 /grafana/;
    }

    # Grafana proxy
    location /grafana/ {
        proxy_pass http://10.50.1.150:3000/grafana/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /grafana;

        # Important: don't strip /grafana
        proxy_redirect off;
    }



    # Loki API proxy (for Grafana to access Loki)
    location /loki/ {
        proxy_pass http://10.50.1.150:3100/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    # Health check endpoint
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
