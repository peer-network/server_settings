# /etc/nginx/sites-available/monitoring.conf
sserver {
    listen 80;
    server_name 80.158.41.189;
    
    # Grafana proxy
    location /grafana/ {
        proxy_pass http://10.50.1.150:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        
        # WebSocket support for Grafana
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_redirect http://10.50.1.150:3000/ /grafana/;
        proxy_redirect / /grafana/;
    }
    
    # Handle Grafana WebSocket specifically
    location /grafana/api/live/ws {
        proxy_pass http://10.50.1.150:3000/api/live/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # Loki API proxy - CORRECTED
    location /loki/ {
        # Remove the trailing slash and rewrite the path
        proxy_pass http://10.50.1.150:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Rewrite /loki/path to /path
        rewrite ^/loki/(.*)$ /$1 break;
    }
    
    # Direct Loki endpoints (alternative approach)
    location ~ ^/loki/api/v1/(.*)$ {
        proxy_pass http://10.50.1.150:3100/api/v1/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Root redirect to Grafana
    location = / {
        return 301 /grafana/;
    }
    
    # Health check endpoint
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}