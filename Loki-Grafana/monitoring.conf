# /etc/nginx/sites-available/monitoring.conf

server {
    listen 80;
    server_name 80.158.41.189;
    
    # Grafana proxy (keep existing)
    location /grafana/ {
        proxy_pass http://10.50.1.150:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_redirect http://10.50.1.150:3000/ /grafana/;
        proxy_redirect / /grafana/;
    }
    
    # Handle Grafana WebSocket specifically
    location /grafana/api/live/ws {
        proxy_pass http://10.50.1.150:3000/api/live/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # Loki API (all endpoints)
    location /loki/ {
        proxy_pass http://10.50.1.150:3100/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


