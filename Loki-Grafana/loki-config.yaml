auth_enabled: false

server:
  http_listen_port: 3100
  http_listen_address: 0.0.0.0
  grpc_listen_port: 9095
  log_level: warning

target: all

common:
  path_prefix: /mnt/loki-store
  storage:
    filesystem:
      chunks_directory: /mnt/loki-store/chunks
      rules_directory: /mnt/loki-store/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory


# Explicitly configure memberlist for single node
memberlist:
  abort_if_cluster_join_fails: false
  bind_port: 7946
  join_members: []


ingester:
  lifecycler:
    # address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  chunk_idle_period: 5m
  max_chunk_age: 1h
  chunk_target_size: 1048576
  chunk_retain_period: 30s
  wal:
    enabled: true
    dir: /mnt/loki-store/wal


limits_config:
  metric_aggregation_enabled: true
  retention_period: 30d
  reject_old_samples: true
  reject_old_samples_max_age: 168h


query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

